name: Bug report 🐞
description: Report a bug in slimgest
title: "(bug): "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the
        following details so we can reproduce and fix the issue.

        If the bug also reproduces with upstream
        [gitingest](https://github.com/coderamp-labs/gitingest), please
        mention that — it usually means the fix belongs upstream first.

  - type: dropdown
    id: interface
    attributes:
      label: How were you invoking slimgest?
      default: 0
      options:
        - "Select one..."
        - CLI (`gitingest` / `slimgest` command)
        - Python API (`from gitingest import ingest`)
        - Self-hosted server
    validations:
      required: true

  - type: input
    id: slimgest_version
    attributes:
      label: slimgest version
      placeholder: e.g., v0.4.0 or commit sha
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g., 3.11.5
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g., Ubuntu 24.04, macOS 14.5, Windows 11
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: Repository or path you were ingesting (if public)
      placeholder: e.g., https://github.com/<user>/<repo> or "/local/path"

  - type: textarea
    id: bug_description
    attributes:
      label: Bug description
      description: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands or code that triggered the bug.
      render: shell

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior / error output
      description: Paste the full error message or stack trace.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues, anything else useful.
