name: Feature request 💡
description: Suggest a new feature or improvement for slimgest
title: "(feat): "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature. The more
        context you can provide, the easier it is to evaluate.

        slimgest's focus is intelligent compression of repo digests for
        LLMs (folder truncation today, AST-aware folding planned).
        Feature requests aligned with that focus are most likely to
        land. Anything specific to the original gitingest web UI or
        unrelated upstream features is better filed at
        [coderamp-labs/gitingest](https://github.com/coderamp-labs/gitingest).

  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: One-sentence description.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the LLM-context use case?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you imagine the feature looks like (CLI flag, API, output shape).

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: interface
    attributes:
      label: Which interface would this affect?
      default: 0
      options:
        - "Select one..."
        - CLI
        - Python API
        - Both
        - Self-hosted server
    validations:
      required: true

  - type: dropdown
    id: willingness
    attributes:
      label: Would you like to implement this yourself?
      default: 0
      options:
        - "Select one..."
        - Yes, I'd like to send a PR
        - Maybe, with some guidance
        - No, just suggesting (absolutely fine)
    validations:
      required: true
